<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Dyke Minix — JOV AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #0a0a0a;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #fff;
      overflow-x: hidden;
    }

    .page {
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .banner {
      width: 100%;
      height: 140px;
      background: linear-gradient(135deg, #1a1200 0%, #3d2900 40%, #7a5500 70%, #c9950a 100%);
    }

    .avatar-wrap {
      margin-top: -52px;
      width: 104px;
      height: 104px;
      border-radius: 50%;
      border: 4px solid #0a0a0a;
      overflow: hidden;
      background: #1a1200;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .avatar-initials {
      font-size: 34px;
      font-weight: 800;
      color: #c9950a;
      letter-spacing: -1px;
    }

    .identity {
      margin-top: 14px;
      text-align: center;
      padding: 0 24px;
    }
    .identity .name {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
    }
    .identity .title {
      margin-top: 5px;
      font-size: 14px;
      font-weight: 500;
      color: #c9950a;
    }
    .identity .company {
      margin-top: 3px;
      font-size: 12px;
      color: #555;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .divider {
      width: calc(100% - 48px);
      height: 1px;
      background: #1e1e1e;
      margin: 26px 0 0;
    }

    .actions {
      width: 100%;
      padding: 14px 24px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 14px 16px;
      text-decoration: none;
      color: #fff;
      transition: background 0.12s, border-color 0.12s;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .action-btn:active {
      background: #1a1400;
      border-color: #c9950a40;
    }

    .action-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #1e1700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .action-icon svg {
      width: 20px;
      height: 20px;
      fill: #c9950a;
      stroke: none;
    }
    .action-icon svg.stroke-only {
      fill: none;
      stroke: #c9950a;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .action-text {
      flex: 1;
      min-width: 0;
    }
    .action-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
    }
    .action-value {
      font-size: 15px;
      font-weight: 600;
      color: #e8e8e8;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .action-arrow svg {
      width: 16px;
      height: 16px;
      stroke: #333;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .save-wrap {
      width: 100%;
      padding: 28px 24px 0;
    }
    .save-btn {
      width: 100%;
      padding: 17px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #7a5500 0%, #c9950a 30%, #e8c050 55%, #c9950a 75%, #7a5500 100%);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #111;
      cursor: pointer;
      box-shadow: 0 4px 32px rgba(201,149,10,0.2);
      transition: filter 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .save-btn:active { transform: scale(0.98); filter: brightness(0.92); }

    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: #282828;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="banner"></div>

    <div class="avatar-wrap">
      <span class="avatar-initials">DM</span>
    </div>

    <div class="identity">
      <div class="name">Dyke Minix</div>
      <div class="title">Founder &amp; CEO</div>
      <div class="company">JOV AI</div>
    </div>

    <div class="divider"></div>

    <div class="actions">

      <a class="action-btn" href="tel:+13126134656">
        <div class="action-icon">
          <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        </div>
        <div class="action-text">
          <div class="action-label">Call</div>
          <div class="action-value">(312) 613-4656</div>
        </div>
        <div class="action-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

      <a class="action-btn" href="mailto:dminix@jov.ai">
        <div class="action-icon">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <div class="action-text">
          <div class="action-label">Email</div>
          <div class="action-value">dminix@jov.ai</div>
        </div>
        <div class="action-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

      <a class="action-btn" href="https://www.linkedin.com/in/dminix" target="_blank" rel="noopener">
        <div class="action-icon">
          <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
        </div>
        <div class="action-text">
          <div class="action-label">LinkedIn</div>
          <div class="action-value">in/dminix</div>
        </div>
        <div class="action-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

      <a class="action-btn" href="https://jov.ai" target="_blank" rel="noopener">
        <div class="action-icon">
          <svg class="stroke-only" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        </div>
        <div class="action-text">
          <div class="action-label">Website</div>
          <div class="action-value">jov.ai</div>
        </div>
        <div class="action-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
      </a>

    </div>

    <div class="save-wrap">
      <button class="save-btn" onclick="saveContact()">Add to Contacts</button>
    </div>

    <div class="footer">JOV AI &nbsp;·&nbsp; Digital Business Card</div>
  </div>

  <script>
    function saveContact() {
      const vcard = [
        'BEGIN:VCARD', 'VERSION:3.0',
        'FN:Dyke Minix', 'N:Minix;Dyke;;;',
        'ORG:JOV AI', 'TITLE:Founder & CEO',
        'TEL;TYPE=CELL:+13126134656',
        'EMAIL;TYPE=WORK:dminix@jov.ai',
        'URL:https://jov.ai',
        'X-SOCIALPROFILE;type=linkedin:https://www.linkedin.com/in/dminix',
        'END:VCARD'
      ].join('\r\n');
      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'Dyke-Minix.vcf';
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
